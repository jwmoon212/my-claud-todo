<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <button id="menu-btn" class="menu-btn" title="Task History">&#9776;</button>

  <div id="overlay" class="overlay"></div>

  <aside id="history-panel" class="history-panel">
    <div class="history-header">
      <h2>Task History</h2>
      <button id="close-btn" class="close-btn" title="Close">&times;</button>
    </div>
    <div id="history-list" class="history-list"></div>
  </aside>

  <div class="card">
    <h1>My To-Do List</h1>
    <form id="task-form">
      <input id="task-input" type="text" placeholder="Add a new task..." autocomplete="off">
      <button type="submit">Add</button>
    </form>
    <ul id="task-list"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
